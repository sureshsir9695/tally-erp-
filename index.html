<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tally ERP 9 Notes Download</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 15px;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      padding: 25px 20px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .card h2 {
      margin-bottom: 10px;
      color: #333;
      font-size: 22px;
    }

    .card p {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    /* View Button */
    .view-btn {
      background: #007bff;
      color: #fff;
    }

    .view-btn:hover {
      background: #0069d9;
    }

    /* Download Button */
    .download-btn {
      background: #28a745;
      color: #fff;
    }

    .download-btn:hover {
      background: #218838;
    }

    /* WhatsApp Button */
    .whatsapp-btn {
      background: #25D366;
      color: white;
    }

    .whatsapp-btn:hover {
      background: #1EBE5D;
    }

    /* Small Mobile */
    @media (max-width: 400px) {
      .card h2 {
        font-size: 20px;
      }

      button {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Tally ERP 9 Notes</h2>
    <p>View, download the PDF or contact us on WhatsApp.</p>

    <!-- View PDF -->
    <button class="view-btn" onclick="viewPDF()">
      📄 View PDF
    </button>

    <!-- Download PDF -->
    <button class="download-btn" onclick="downloadPDF()">
      ⬇️ Download PDF
    </button>

    <!-- WhatsApp -->
    <button class="whatsapp-btn" onclick="chatWhatsApp()">
      💬 Chat on WhatsApp
    </button>

  </div>

  <script>
    // View PDF
    function viewPDF() {
      window.open(
        "https://drive.google.com/file/d/1dLS0-SXVSckjc2RgtDg0zo2dGMT7NcWd/view",
        "_blank"
      );
    }

    // Download PDF
    function downloadPDF() {
      window.location.href =
        "https://drive.google.com/uc?export=download&id=1dLS0-SXVSckjc2RgtDg0zo2dGMT7NcWd";
    }

    // WhatsApp Chat
    function chatWhatsApp() {
      window.open(
        "https://wa.me/919695803566?text=Hello%20Prime%20Computer%20Education,%20I%20need%20information.",
        "_blank"
      );
    }
  </script>

</body>
</html>
